<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delta Force — Zero Dam</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --bg:#030507;
      --panel:rgba(0,255,200,.06);
      --line:rgba(0,255,200,.22);
      --line-soft:rgba(255,255,255,.10);
      --ink:#f3fffb;
      --muted:#9ed9ca;
      --brand:#00ffc8;
      --brand-soft:#7fffe6;
      --green:#6dff8a;
      --shadow:0 20px 60px rgba(0,0,0,.42);
      --radius:18px;
      --radius-lg:28px;
      --max:1680px;
      --ops:#21e6f5;
    }

    html, body{
      height:100%;
      overflow:hidden;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100dvh;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        linear-gradient(180deg, rgba(0,0,0,.38), rgba(0,0,0,.74)),
        url('https://i.imgur.com/TytkDtb.png') no-repeat center center fixed;
      background-size:cover;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at top center, rgba(0,255,200,.16), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.14));
      z-index:0;
    }

    #preloader{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:18px;
      background:#000;
      z-index:9999;
      transition:opacity .35s ease, visibility .35s ease;
    }

    #preloader.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .loader{
      width:66px;
      height:66px;
      border-radius:50%;
      border:6px solid rgba(0,255,200,.18);
      border-top-color:var(--brand);
      animation:spin 1s linear infinite;
      box-shadow:0 0 22px rgba(0,255,200,.18);
    }

    @keyframes spin{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    .shell{
      position:relative;
      z-index:1;
      max-width:var(--max);
      margin:0 auto;
      height:100dvh;
      padding:18px 20px;
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr);
      gap:16px;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:4px 0 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      min-height:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .brand img{
      width:74px;
      max-width:100%;
      filter:drop-shadow(0 0 10px rgba(0,255,200,.35));
      flex:0 0 auto;
    }

    .brand-copy{
      min-width:0;
    }

    .eyebrow{
      font-family:'Orbitron',sans-serif;
      letter-spacing:2px;
      font-size:11px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:5px;
    }

    .brand-copy h1{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.8rem,3vw,3.3rem);
      letter-spacing:4px;
      line-height:1;
      color:var(--brand);
      text-shadow:0 0 12px rgba(0,255,200,.28), 0 0 24px rgba(0,255,200,.10);
    }

    .status-chip{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 13px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,255,200,.08);
      color:var(--brand-soft);
      box-shadow:var(--shadow);
      font-size:.84rem;
      white-space:nowrap;
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--brand);
      box-shadow:0 0 10px var(--brand);
    }

    .controls{
      display:grid;
      grid-template-columns:minmax(220px,1.15fr) minmax(170px,.52fr) auto auto;
      gap:12px;
      min-height:0;
    }

    .field,.select,.ghost-btn{
      min-height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,8,8,.66);
      color:var(--ink);
      box-shadow:var(--shadow);
      font-size:.92rem;
    }

    .field,.select{
      width:100%;
      padding:0 15px;
      outline:none;
    }

    .field::placeholder{
      color:rgba(191,254,243,.48);
    }

    .field:focus,.select:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 3px rgba(0,255,200,.10), var(--shadow);
    }

    .ghost-btn{
      padding:0 16px;
      font-weight:700;
      color:var(--brand);
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .ghost-btn:hover{
      transform:translateY(-1px);
      border-color:var(--brand);
      box-shadow:0 0 0 2px rgba(0,255,200,.08), var(--shadow);
    }

    .layout{
      min-height:0;
      display:grid;
      grid-template-columns:360px minmax(0,1fr) 360px;
      gap:18px;
      overflow:hidden;
    }

    .panel{
      background:linear-gradient(180deg, rgba(0,255,200,.05), rgba(0,255,200,.02));
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      min-height:0;
    }

    .list-panel,
    .detail-panel{
      padding:14px;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
    }

    .results-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:0 4px 12px;
      color:var(--muted);
      font-size:.9rem;
      border-bottom:1px solid rgba(255,255,255,.07);
      margin-bottom:12px;
      flex:0 0 auto;
    }

    .marker-list{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding-right:4px;
      display:grid;
      gap:10px;
      align-content:start;
    }

    .marker-list::-webkit-scrollbar,
    .detail-root::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    .marker-list::-webkit-scrollbar-thumb,
    .detail-root::-webkit-scrollbar-thumb{
      background:rgba(0,255,200,.16);
      border-radius:999px;
    }

    .marker-card{
      display:grid;
      grid-template-columns:56px minmax(0,1fr);
      gap:12px;
      align-items:center;
      padding:10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,255,200,.045);
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .marker-card:hover,
    .marker-card.active{
      transform:translateY(-1px);
      border-color:rgba(0,255,200,.34);
      box-shadow:0 0 0 2px rgba(0,255,200,.08), 0 18px 38px rgba(0,0,0,.25);
      background:rgba(0,255,200,.065);
    }

    .marker-icon-box{
      width:56px;
      height:56px;
      border-radius:14px;
      border:1px solid rgba(0,255,200,.16);
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 50% 18%, rgba(0,255,200,.18), transparent 36%),
        linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.35)),
        #081418;
      font-family:'Orbitron',sans-serif;
      font-size:.75rem;
      color:#cbfff6;
      text-transform:uppercase;
      text-align:center;
      padding:4px;
      line-height:1.05;
    }

    .marker-copy{
      min-width:0;
    }

    .marker-chip{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      font-size:.65rem;
      letter-spacing:.8px;
      text-transform:uppercase;
      border:1px solid rgba(0,255,200,.18);
      background:rgba(0,255,200,.08);
      color:#c8fff5;
      margin-bottom:8px;
    }

    .marker-title{
      font-family:'Orbitron',sans-serif;
      font-size:.92rem;
      line-height:1.15;
      color:var(--ink);
      text-transform:uppercase;
      letter-spacing:1px;
      word-break:break-word;
    }

    .marker-sub{
      margin-top:5px;
      color:var(--green);
      font-size:.78rem;
      line-height:1.2;
      word-break:break-word;
    }

    .map-panel{
      position:relative;
      min-height:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .map-toolbar{
      position:absolute;
      top:12px;
      right:12px;
      z-index:6;
      display:flex;
      gap:8px;
    }

    .tool-btn{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid rgba(0,255,200,.18);
      background:rgba(0,8,8,.78);
      color:#eafcf7;
      box-shadow:var(--shadow);
      cursor:pointer;
      font-size:1.05rem;
      font-weight:700;
    }

    .tool-btn:hover{
      border-color:var(--brand);
      box-shadow:0 0 0 2px rgba(0,255,200,.08), var(--shadow);
    }

    .map-viewport{
      position:relative;
      width:100%;
      height:100%;
      min-height:0;
      overflow:hidden;
      border-radius:var(--radius-lg);
      cursor:grab;
      background:
        radial-gradient(circle at center, rgba(0,255,200,.10), transparent 40%),
        rgba(3,10,12,.55);
    }

    .map-viewport.dragging{
      cursor:grabbing;
    }

    .map-stage{
      position:absolute;
      top:0;
      left:0;
      transform-origin:top left;
      will-change:transform;
    }

    .map-image{
      position:absolute;
      top:0;
      left:0;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    .marker-layer{
      position:absolute;
      inset:0;
    }

    .map-marker{
      position:absolute;
      width:18px;
      height:18px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.88);
      background:var(--ops);
      transform:translate(-50%, -50%);
      cursor:pointer;
      box-shadow:0 0 0 0 rgba(33,230,245,.38), 0 0 14px rgba(33,230,245,.45);
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
      z-index:4;
    }

    .map-marker:hover,
    .map-marker.active{
      transform:translate(-50%, -50%) scale(1.2);
      box-shadow:0 0 0 7px rgba(33,230,245,.16), 0 0 18px rgba(33,230,245,.58);
      background:#00ffc8;
    }

    .map-marker.extract{ background:#23e28f; box-shadow:0 0 14px rgba(35,226,143,.45);}
    .map-marker.loot{ background:#efcc61; box-shadow:0 0 14px rgba(239,204,97,.45);}
    .map-marker.utility{ background:#ff3b63; box-shadow:0 0 14px rgba(255,59,99,.45);}
    .map-marker.task{ background:#c18bff; box-shadow:0 0 14px rgba(193,139,255,.45);}

    .detail-root{
      height:100%;
      min-height:0;
      overflow:auto;
    }

    .detail-empty{
      height:100%;
      display:grid;
      place-items:center;
      text-align:center;
      padding:24px;
      color:#d9fff9;
    }

    .detail-wrap{
      position:relative;
      padding:10px 4px 4px;
      min-height:100%;
    }

    .detail-head{
      margin-bottom:14px;
    }

    .detail-head h2{
      font-family:'Orbitron',sans-serif;
      font-size:1.35rem;
      color:#fff;
      text-transform:uppercase;
      line-height:1.1;
      margin-bottom:8px;
    }

    .detail-sub{
      color:var(--green);
      font-size:.92rem;
      line-height:1.3;
    }

    .separator{
      height:1px;
      background:rgba(255,255,255,.18);
      margin:12px 0 14px;
    }

    .mini-chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0 0 16px;
    }

    .mini-chip{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border-radius:999px;
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.7px;
      border:1px solid rgba(0,255,200,.16);
      background:rgba(0,255,200,.07);
      color:#cbfff6;
    }

    .info-block{
      padding:0 0 14px;
    }

    .info-block + .info-block{
      border-top:1px solid rgba(255,255,255,.14);
      padding-top:14px;
      margin-top:2px;
    }

    .info-title{
      font-family:'Orbitron',sans-serif;
      font-size:1rem;
      line-height:1.18;
      color:#fff;
      margin-bottom:7px;
      text-transform:uppercase;
    }

    .desc{
      color:#f0f5f5;
      font-size:.95rem;
      line-height:1.45;
      opacity:.96;
    }

    .coords{
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      color:#bffef3;
      font-size:.82rem;
      line-height:1.4;
    }

    .empty-state,.error-state{
      padding:24px;
      text-align:center;
      color:#d9fff9;
      border:1px dashed rgba(0,255,200,.24);
      border-radius:20px;
      background:rgba(0,255,200,.03);
    }

    @media (max-width:1280px){
      .layout{
        grid-template-columns:320px minmax(0,1fr) 320px;
      }
    }

    @media (max-width:1100px){
      .shell{
        padding:16px;
      }

      .layout{
        grid-template-columns:1fr;
        grid-template-rows:minmax(180px, 28dvh) minmax(280px,1fr) minmax(220px, 30dvh);
      }

      .marker-list{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }

    @media (max-width:760px){
      .shell{
        gap:12px;
        padding:12px;
      }

      .topbar{
        gap:12px;
        padding-bottom:10px;
      }

      .brand img{
        width:58px;
      }

      .brand-copy h1{
        font-size:1.9rem;
        letter-spacing:3px;
      }

      .status-chip{
        font-size:.76rem;
        padding:8px 11px;
      }

      .controls{
        grid-template-columns:1fr;
        gap:10px;
      }

      .marker-list{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div id="preloader">
    <div class="loader"></div>
    <p style="font-family:'Orbitron',sans-serif; letter-spacing:2px; color:#00ffc8;">Loading Zero Dam...</p>
  </div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <img src="https://i.imgur.com/LtMzKj2.png" alt="Delta Force Logo">
        <div class="brand-copy">
          <div class="eyebrow">Interactive Tactical Map</div>
          <h1>DELTA FORCE</h1>
        </div>
      </div>

      <div class="status-chip">
        <span class="status-dot"></span>
        <span id="dbStatus">Initializing map data...</span>
      </div>
    </header>

    <section class="controls">
      <input id="searchInput" class="field" type="text" placeholder="Search markers, loot, extracts, tasks..." />
      <select id="typeFilter" class="select">
        <option value="all">All marker types</option>
      </select>
      <button id="resetViewBtn" class="ghost-btn" type="button">Reset View</button>
      <button id="refreshBtn" class="ghost-btn" type="button">Refresh Data</button>
    </section>

    <section class="layout">
      <aside class="panel list-panel">
        <div class="results-bar">
          <div id="resultsText">Loading markers...</div>
          <div id="resultsHint">All marker types</div>
        </div>
        <div id="markerList" class="marker-list"></div>
      </aside>

      <section class="panel map-panel">
        <div class="map-toolbar">
          <button class="tool-btn" id="zoomInBtn" type="button">+</button>
          <button class="tool-btn" id="zoomOutBtn" type="button">−</button>
        </div>
        <div id="mapViewport" class="map-viewport">
          <div id="mapStage" class="map-stage">
            <img
              id="mapImage"
              class="map-image"
              src="./assets/img/map/op/zero-dam.webp"
              alt="Zero Dam"
              draggable="false"
            />
            <div id="markerLayer" class="marker-layer"></div>
          </div>
        </div>
      </section>

      <aside class="panel detail-panel">
        <div id="detailRoot" class="detail-root detail-empty">Select a marker on the map or from the list.</div>
      </aside>
    </section>
  </main>

  <script>
    const ZERO_DAM_DATA = {
      id: 'zero-dam',
      name: 'Zero Dam',
      width: 8192,
      height: 8192,
      minZoom: -3,
      maxZoom: 3,
      initialViewport: {
        position: { x: 4444, y: 2133 },
        zoom: -0.5
      },
      markers: [
        {
          id: 'marker-1',
          x: 2681.0619605630795,
          y: 1537.2455735747822,
          title: 'Conditional Extract',
          description: 'Exit only without a backpack.',
          icon: 'conditional-extract'
        },
        {
          id: 'marker-2',
          x: 2774.5191749972832,
          y: 1657.0571363374925,
          title: 'Travel Bag',
          description: 'Common loot container.',
          icon: 'travel-bag'
        },
        {
          id: 'marker-3',
          x: 2307,
          y: 1932,
          title: 'Spawn',
          description: 'Player spawnpoint.',
          icon: 'spawn'
        },
        {
          id: 'marker-4',
          x: 3028.2560383609334,
          y: 1824.1329877352916,
          title: 'Barracks Storage Room',
          description: 'Requires a keycard to open.',
          icon: 'keycard'
        },
        {
          id: 'marker-5',
          x: 2708.3435464942595,
          y: 2067.3698644059136,
          title: 'Fence',
          description: 'Engineers can cut through this fence.',
          icon: 'engineer'
        },
        {
          id: 'marker-6',
          x: 2975.686654051068,
          y: 2826.841402418788,
          title: 'Recon Scanner',
          description: 'As recon, interact with the scanner to find out if an enemy or spawnpoint is active this match.',
          icon: 'recon'
        },
        {
          id: 'marker-7',
          x: 3912.068266914574,
          y: 3152.635583920222,
          title: 'Zipline',
          description: '',
          icon: 'zipline'
        },
        {
          id: 'marker-8',
          x: 6321.319882039057,
          y: 3881.4275945751856,
          title: 'Normal Extract',
          description: 'Available at any time.',
          icon: 'extract'
        }
      ]
    };

    const state = {
      all: [],
      filtered: [],
      selectedId: null,
      scale: 1,
      x: 0,
      y: 0,
      dragging: false,
      dragStartX: 0,
      dragStartY: 0,
      startPanX: 0,
      startPanY: 0
    };

    const els = {
      preloader: document.getElementById('preloader'),
      dbStatus: document.getElementById('dbStatus'),
      searchInput: document.getElementById('searchInput'),
      typeFilter: document.getElementById('typeFilter'),
      resetViewBtn: document.getElementById('resetViewBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      resultsText: document.getElementById('resultsText'),
      resultsHint: document.getElementById('resultsHint'),
      markerList: document.getElementById('markerList'),
      detailRoot: document.getElementById('detailRoot'),
      mapViewport: document.getElementById('mapViewport'),
      mapStage: document.getElementById('mapStage'),
      mapImage: document.getElementById('mapImage'),
      markerLayer: document.getElementById('markerLayer'),
      zoomInBtn: document.getElementById('zoomInBtn'),
      zoomOutBtn: document.getElementById('zoomOutBtn')
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function classifyMarker(marker) {
      const icon = String(marker.icon || '').toLowerCase();
      const title = String(marker.title || '').toLowerCase();

      if (icon.includes('extract') || title.includes('extract')) return 'extract';
      if (
        icon.includes('bag') || icon.includes('toolbox') || icon.includes('crate') ||
        icon.includes('safe') || icon.includes('medkit') || icon.includes('stash') ||
        icon.includes('case') || icon.includes('drawer') || icon.includes('locker') ||
        icon.includes('nest') || icon.includes('clothing') || icon.includes('suitcase') ||
        icon.includes('briefcase') || icon.includes('server') || icon.includes('computer')
      ) return 'loot';
      if (
        icon.includes('engineer') || icon.includes('recon') || icon.includes('zipline') ||
        icon.includes('ladder') || icon.includes('stairs') || icon.includes('spawn') ||
        icon.includes('kick-door') || icon.includes('scissor-lift')
      ) return 'utility';
      if (icon.includes('task') || icon.includes('keycard')) return 'task';
      return 'utility';
    }

    function normalizeMarker(marker, index) {
      const kind = classifyMarker(marker);
      return {
        ...marker,
        kind,
        typeLabel: kind.charAt(0).toUpperCase() + kind.slice(1),
        id: marker.id || `marker-${index + 1}`
      };
    }

    function zoomToScale(zoom) {
      return Math.pow(2, zoom);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function populateTypeFilter() {
      const types = [...new Set(state.all.map(m => m.typeLabel))].sort((a, b) => a.localeCompare(b));
      els.typeFilter.innerHTML = `
        <option value="all">All marker types</option>
        ${types.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join('')}
      `;
    }

    function applyFilters() {
      const query = els.searchInput.value.trim().toLowerCase();
      const type = els.typeFilter.value;

      state.filtered = state.all.filter(marker => {
        const haystack = [
          marker.title,
          marker.description,
          marker.icon,
          marker.kind,
          marker.typeLabel
        ].join(' ').toLowerCase();

        const matchesSearch = !query || haystack.includes(query);
        const matchesType = type === 'all' || marker.typeLabel === type;
        return matchesSearch && matchesType;
      });

      if (!state.filtered.some(marker => marker.id === state.selectedId)) {
        state.selectedId = state.filtered[0]?.id || null;
      }

      els.resultsText.textContent = `${state.filtered.length} marker${state.filtered.length === 1 ? '' : 's'}`;
      els.resultsHint.textContent = type === 'all' ? 'All marker types' : type;
    }

    function renderMarkerList() {
      if (!state.filtered.length) {
        els.markerList.innerHTML = `<div class="empty-state">No markers matched your current filters.</div>`;
        return;
      }

      els.markerList.innerHTML = state.filtered.map(marker => `
        <article class="marker-card ${marker.id === state.selectedId ? 'active' : ''}" data-id="${escapeHtml(marker.id)}">
          <div class="marker-icon-box">${escapeHtml((marker.icon || marker.kind || 'mk').slice(0, 8))}</div>
          <div class="marker-copy">
            <div class="marker-chip">${escapeHtml(marker.typeLabel)}</div>
            <div class="marker-title">${escapeHtml(marker.title || 'Untitled Marker')}</div>
            <div class="marker-sub">${escapeHtml(marker.icon || 'marker')}</div>
          </div>
        </article>
      `).join('');

      els.markerList.querySelectorAll('.marker-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          state.selectedId = id;
          centerOnMarker(id);
          renderAll();
        });
      });
    }

    function renderMapMarkers() {
      els.markerLayer.innerHTML = state.filtered.map(marker => `
        <button
          class="map-marker ${escapeHtml(marker.kind)} ${marker.id === state.selectedId ? 'active' : ''}"
          data-id="${escapeHtml(marker.id)}"
          title="${escapeHtml(marker.title || 'Marker')}"
          style="left:${marker.x}px; top:${marker.y}px;"
          type="button"
        ></button>
      `).join('');

      els.markerLayer.querySelectorAll('.map-marker').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          state.selectedId = btn.dataset.id;
          renderAll();
        });
      });
    }

    function renderDetail() {
      const marker =
        state.filtered.find(m => m.id === state.selectedId) ||
        state.all.find(m => m.id === state.selectedId);

      if (!marker) {
        els.detailRoot.className = 'detail-root detail-empty';
        els.detailRoot.textContent = 'Select a marker on the map or from the list.';
        return;
      }

      els.detailRoot.className = 'detail-root';
      els.detailRoot.innerHTML = `
        <div class="detail-wrap">
          <div class="detail-head">
            <h2>${escapeHtml(marker.title || 'Untitled Marker')}</h2>
            <div class="detail-sub">${escapeHtml(marker.icon || marker.typeLabel || 'marker')}</div>
          </div>

          <div class="separator"></div>

          <div class="mini-chip-row">
            <span class="mini-chip">${escapeHtml(marker.typeLabel)}</span>
            <span class="mini-chip">${escapeHtml(marker.icon || 'marker')}</span>
          </div>

          <div class="info-block">
            <div class="info-title">Description</div>
            <div class="desc">${escapeHtml(marker.description || 'No description available.')}</div>
          </div>

          <div class="info-block">
            <div class="info-title">Coordinates</div>
            <div class="coords">x: ${Number(marker.x).toFixed(2)}<br>y: ${Number(marker.y).toFixed(2)}</div>
          </div>

          <div class="info-block">
            <div class="info-title">Map Context</div>
            <div class="desc">
              Zero Dam is an Operations map built around layered structures, choke control, and disciplined staging.
              Markers like this can be used for loot planning, route prep, production reference, or tactical breakdowns.
            </div>
          </div>
        </div>
      `;
    }

    function applyTransform() {
      els.mapStage.style.width = `${ZERO_DAM_DATA.width}px`;
      els.mapStage.style.height = `${ZERO_DAM_DATA.height}px`;
      els.mapImage.style.width = `${ZERO_DAM_DATA.width}px`;
      els.mapImage.style.height = `${ZERO_DAM_DATA.height}px`;
      els.mapStage.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
    }

    function resetView() {
      state.scale = zoomToScale(ZERO_DAM_DATA.initialViewport.zoom || 0);
      const centerX = ZERO_DAM_DATA.initialViewport.position?.x || ZERO_DAM_DATA.width / 2;
      const centerY = ZERO_DAM_DATA.initialViewport.position?.y || ZERO_DAM_DATA.height / 2;
      const vw = els.mapViewport.clientWidth;
      const vh = els.mapViewport.clientHeight;
      state.x = vw / 2 - centerX * state.scale;
      state.y = vh / 2 - centerY * state.scale;
      applyTransform();
    }

    function zoomBy(delta, clientX, clientY) {
      const currentZoom = Math.log2(state.scale);
      const nextZoom = clamp(currentZoom + delta, ZERO_DAM_DATA.minZoom, ZERO_DAM_DATA.maxZoom);
      const nextScale = zoomToScale(nextZoom);

      const rect = els.mapViewport.getBoundingClientRect();
      const px = clientX - rect.left;
      const py = clientY - rect.top;

      const worldX = (px - state.x) / state.scale;
      const worldY = (py - state.y) / state.scale;

      state.scale = nextScale;
      state.x = px - worldX * state.scale;
      state.y = py - worldY * state.scale;

      applyTransform();
    }

    function centerOnMarker(id) {
      const marker = state.all.find(m => m.id === id);
      if (!marker) return;
      const vw = els.mapViewport.clientWidth;
      const vh = els.mapViewport.clientHeight;
      state.x = vw / 2 - marker.x * state.scale;
      state.y = vh / 2 - marker.y * state.scale;
      applyTransform();
    }

    function renderAll() {
      applyFilters();
      renderMarkerList();
      renderMapMarkers();
      renderDetail();
    }

    function refreshData() {
      state.all = (ZERO_DAM_DATA.markers || []).map(normalizeMarker);
      state.filtered = [...state.all];
      state.selectedId = state.all[0]?.id || null;
      populateTypeFilter();
      resetView();
      renderAll();
      els.dbStatus.textContent = `Zero Dam loaded — ${state.all.length} markers`;
    }

    els.searchInput.addEventListener('input', renderAll);
    els.typeFilter.addEventListener('change', renderAll);
    els.refreshBtn.addEventListener('click', refreshData);
    els.resetViewBtn.addEventListener('click', resetView);

    els.zoomInBtn.addEventListener('click', () => {
      const rect = els.mapViewport.getBoundingClientRect();
      zoomBy(0.25, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    els.zoomOutBtn.addEventListener('click', () => {
      const rect = els.mapViewport.getBoundingClientRect();
      zoomBy(-0.25, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    els.mapViewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoomBy(e.deltaY < 0 ? 0.15 : -0.15, e.clientX, e.clientY);
    }, { passive:false });

    els.mapViewport.addEventListener('mousedown', (e) => {
      if (e.target.closest('.map-marker')) return;
      state.dragging = true;
      els.mapViewport.classList.add('dragging');
      state.dragStartX = e.clientX;
      state.dragStartY = e.clientY;
      state.startPanX = state.x;
      state.startPanY = state.y;
    });

    window.addEventListener('mousemove', (e) => {
      if (!state.dragging) return;
      state.x = state.startPanX + (e.clientX - state.dragStartX);
      state.y = state.startPanY + (e.clientY - state.dragStartY);
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      state.dragging = false;
      els.mapViewport.classList.remove('dragging');
    });

    els.mapViewport.addEventListener('click', () => {
      // keep empty click behavior for now
    });

    window.addEventListener('resize', () => {
      applyTransform();
    });

    window.addEventListener('load', () => {
      refreshData();
      setTimeout(() => els.preloader.classList.add('hidden'), 350);
    });
  </script>
</body>
</html>
