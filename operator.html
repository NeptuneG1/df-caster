<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delta Force — Operators</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --bg:#030507;
      --panel:rgba(0,255,200,.06);
      --line:rgba(0,255,200,.22);
      --line-soft:rgba(255,255,255,.10);
      --ink:#f3fffb;
      --muted:#9ed9ca;
      --brand:#00ffc8;
      --brand-soft:#7fffe6;
      --green:#6dff8a;
      --shadow:0 20px 60px rgba(0,0,0,.42);
      --radius:18px;
      --radius-lg:28px;
      --max:1600px;

      --assault:#ff3b63;
      --engineer:#efcc61;
      --recon:#21e6f5;
      --support:#23e28f;
    }

    html,
    body{
      height:100%;
      overflow:hidden;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100dvh;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        linear-gradient(180deg, rgba(0,0,0,.38), rgba(0,0,0,.74)),
        url('https://i.imgur.com/TytkDtb.png') no-repeat center center fixed;
      background-size:cover;
      overflow:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at top center, rgba(0,255,200,.16), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.14));
      z-index:0;
    }

    #preloader{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:18px;
      background:#000;
      z-index:9999;
      transition:opacity .35s ease, visibility .35s ease;
    }

    #preloader.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .loader{
      width:66px;
      height:66px;
      border-radius:50%;
      border:6px solid rgba(0,255,200,.18);
      border-top-color:var(--brand);
      animation:spin 1s linear infinite;
      box-shadow:0 0 22px rgba(0,255,200,.18);
    }

    @keyframes spin{
      from{transform:rotate(0deg);}
      to{transform:rotate(360deg);}
    }

    .shell{
      position:relative;
      z-index:1;
      max-width:var(--max);
      margin:0 auto;
      height:100dvh;
      padding:18px 20px;
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr);
      gap:16px;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      padding:4px 0 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      min-height:0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .brand img{
      width:74px;
      max-width:100%;
      filter:drop-shadow(0 0 10px rgba(0,255,200,.35));
      flex:0 0 auto;
    }

    .brand-copy{
      min-width:0;
    }

    .eyebrow{
      font-family:'Orbitron',sans-serif;
      letter-spacing:2px;
      font-size:11px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:5px;
    }

    .brand-copy h1{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.8rem,3vw,3.3rem);
      letter-spacing:4px;
      line-height:1;
      color:var(--brand);
      text-shadow:0 0 12px rgba(0,255,200,.28), 0 0 24px rgba(0,255,200,.10);
    }

    .status-chip{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 13px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,255,200,.08);
      color:var(--brand-soft);
      box-shadow:var(--shadow);
      font-size:.84rem;
      white-space:nowrap;
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--brand);
      box-shadow:0 0 10px var(--brand);
    }

    .controls{
      display:grid;
      grid-template-columns:minmax(220px,1.15fr) minmax(170px,.52fr) auto;
      gap:12px;
      min-height:0;
    }

    .field,.select,.ghost-btn{
      min-height:46px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,8,8,.66);
      color:var(--ink);
      box-shadow:var(--shadow);
      font-size:.92rem;
    }

    .field,.select{
      width:100%;
      padding:0 15px;
      outline:none;
    }

    .field::placeholder{
      color:rgba(191,254,243,.48);
    }

    .field:focus,.select:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 3px rgba(0,255,200,.10), var(--shadow);
    }

    .ghost-btn{
      padding:0 16px;
      font-weight:700;
      color:var(--brand);
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .ghost-btn:hover{
      transform:translateY(-1px);
      border-color:var(--brand);
      box-shadow:0 0 0 2px rgba(0,255,200,.08), var(--shadow);
    }

    .layout{
      min-height:0;
      display:grid;
      grid-template-columns:390px minmax(0,1fr);
      gap:18px;
      overflow:hidden;
    }

    .panel{
      background:linear-gradient(180deg, rgba(0,255,200,.05), rgba(0,255,200,.02));
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      min-height:0;
    }

    .list-panel{
      padding:14px;
      display:flex;
      flex-direction:column;
      min-height:0;
      overflow:hidden;
    }

    .results-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:0 4px 12px;
      color:var(--muted);
      font-size:.9rem;
      border-bottom:1px solid rgba(255,255,255,.07);
      margin-bottom:12px;
      flex:0 0 auto;
    }

    .operator-list{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding-right:4px;
      display:grid;
      gap:12px;
      align-content:start;
    }

    .operator-list::-webkit-scrollbar,
    .detail-root::-webkit-scrollbar{
      width:10px;
      height:10px;
    }

    .operator-list::-webkit-scrollbar-thumb,
    .detail-root::-webkit-scrollbar-thumb{
      background:rgba(0,255,200,.16);
      border-radius:999px;
    }

    .operator-card{
      display:grid;
      grid-template-columns:82px minmax(0,1fr);
      gap:12px;
      align-items:center;
      padding:11px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,255,200,.045);
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .operator-card:hover,
    .operator-card.active{
      transform:translateY(-2px);
      border-color:var(--role-color, var(--brand));
      box-shadow:0 0 0 2px var(--role-border, rgba(0,255,200,.12)), 0 18px 38px rgba(0,0,0,.25);
      background:rgba(0,255,200,.065);
    }

    .thumb{
      width:82px;
      height:82px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(0,255,200,.14);
      background:
        radial-gradient(circle at 50% 18%, rgba(0,255,200,.18), transparent 36%),
        linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.35)),
        #081418;
      flex:0 0 auto;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .thumb-placeholder{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      text-align:center;
      padding:8px;
      font-family:'Orbitron',sans-serif;
      font-size:.7rem;
      color:#ddfff8;
      text-transform:uppercase;
      line-height:1.1;
    }

    .card-copy{
      min-width:0;
    }

    .role-chip{
      display:inline-flex;
      align-items:center;
      padding:4px 9px;
      border-radius:999px;
      font-size:.68rem;
      letter-spacing:.8px;
      text-transform:uppercase;
      border:1px solid var(--role-border, rgba(0,255,200,.18));
      background:var(--role-bg, rgba(0,255,200,.08));
      color:var(--role-color, #c8fff5);
      margin-bottom:8px;
    }

    .codename{
      font-family:'Orbitron',sans-serif;
      font-size:1rem;
      line-height:1.15;
      color:var(--ink);
      text-transform:uppercase;
      letter-spacing:1px;
      word-break:break-word;
    }

    .realname{
      margin-top:5px;
      color:var(--green);
      font-size:.84rem;
      line-height:1.2;
      word-break:break-word;
    }

    .detail-panel{
      min-height:0;
      overflow:hidden;
    }

    .detail-root{
      height:100%;
      min-height:0;
      overflow:auto;
    }

    .detail-empty{
      height:100%;
      display:grid;
      place-items:center;
      text-align:center;
      padding:24px;
      color:#d9fff9;
    }

    .detail-wrap{
      position:relative;
      padding:24px 26px;
      min-height:100%;
      overflow:hidden;
    }

    .detail-bg-art{
      position:absolute;
      top:8px;
      right:8px;
      width:min(50%, 500px);
      max-height:360px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      pointer-events:none;
      z-index:0;
      opacity:.95;
    }

    .detail-bg-art img{
      width:100%;
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 10px 28px rgba(0,0,0,.30));
      opacity:.96;
    }

    .detail-header,
    .separator,
    .mini-chip-row,
    .info-block{
      position:relative;
      z-index:1;
    }

    .detail-header{
      display:grid;
      grid-template-columns:96px minmax(0,1fr);
      gap:16px;
      align-items:center;
      margin-bottom:12px;
    }

    .detail-thumb{
      width:96px;
      height:96px;
      border-radius:20px;
      overflow:hidden;
      border:1px solid rgba(0,255,200,.16);
      background:
        radial-gradient(circle at 50% 18%, rgba(0,255,200,.18), transparent 36%),
        linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.35)),
        #081418;
    }

    .detail-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .detail-title h2{
      font-family:'Orbitron',sans-serif;
      font-size:clamp(1.9rem,3vw,3.2rem);
      line-height:1;
      text-transform:uppercase;
      color:#fff;
      letter-spacing:1px;
      margin-bottom:8px;
      word-break:break-word;
    }

    .detail-title .name{
      color:var(--green);
      font-size:1.12rem;
      line-height:1.25;
      font-weight:600;
    }

    .separator{
      height:1px;
      background:rgba(255,255,255,.22);
      margin:14px 0 16px;
    }

    .mini-chip-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0 0 18px;
    }

    .mini-chip{
      display:inline-flex;
      align-items:center;
      padding:7px 10px;
      border-radius:999px;
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.7px;
      border:1px solid rgba(0,255,200,.16);
      background:rgba(0,255,200,.07);
      color:#cbfff6;
    }

    .info-block{
      padding:2px 0 14px;
    }

    .info-block + .info-block{
      border-top:1px solid rgba(255,255,255,.18);
      padding-top:16px;
      margin-top:2px;
    }

    .position-row{
      display:grid;
      grid-template-columns:72px minmax(0,1fr);
      gap:14px;
      align-items:start;
    }

    .position-icon{
      width:72px;
      height:72px;
      display:grid;
      place-items:center;
      border-radius:16px;
      background:var(--role-bg, rgba(255,66,98,.06));
      border:1px solid var(--role-border, rgba(255,66,98,.16));
      overflow:hidden;
    }

    .position-icon img{
      width:52px;
      height:52px;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 0 10px rgba(0,0,0,.12));
    }

    .position-fallback{
      font-family:'Orbitron',sans-serif;
      color:var(--role-color, #fff);
      font-size:1.45rem;
      text-transform:uppercase;
    }

    .position-label{
      display:block;
      font-family:'Orbitron',sans-serif;
      color:var(--role-color, #fff);
      font-size:1rem;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-bottom:6px;
    }

    .position-title{
      font-family:'Orbitron',sans-serif;
      color:var(--role-color, #fff);
      font-size:1.75rem;
      line-height:1.1;
      text-transform:capitalize;
      margin-bottom:6px;
    }

    .desc{
      color:#f0f5f5;
      font-size:.98rem;
      line-height:1.32;
      opacity:.96;
    }

    .ability-title{
      font-family:'Orbitron',sans-serif;
      font-size:1.1rem;
      line-height:1.18;
      color:#fff;
      margin-bottom:7px;
    }

    .ability-desc{
      color:#f2f2f2;
      font-size:.98rem;
      line-height:1.3;
      opacity:.94;
    }

    .empty-state,.error-state{
      padding:24px;
      text-align:center;
      color:#d9fff9;
      border:1px dashed rgba(0,255,200,.24);
      border-radius:20px;
      background:rgba(0,255,200,.03);
    }

    @media (max-width:1100px){
      .shell{
        padding:16px;
      }

      .layout{
        grid-template-columns:1fr;
        grid-template-rows:minmax(190px, 34dvh) minmax(0,1fr);
      }

      .operator-list{
        grid-template-columns:repeat(2, minmax(0,1fr));
        gap:10px;
      }

      .operator-card{
        grid-template-columns:1fr;
        text-align:center;
        gap:10px;
        padding:12px 10px;
        align-content:start;
      }

      .thumb{
        width:100%;
        max-width:106px;
        height:106px;
        margin:0 auto;
      }

      .role-chip{
        margin:0 auto 8px;
      }
    }

    @media (max-width:760px){
      .shell{
        gap:12px;
        padding:12px;
      }

      .topbar{
        gap:12px;
        padding-bottom:10px;
      }

      .brand img{
        width:58px;
      }

      .brand-copy h1{
        font-size:1.9rem;
        letter-spacing:3px;
      }

      .status-chip{
        font-size:.76rem;
        padding:8px 11px;
      }

      .controls{
        grid-template-columns:1fr;
        gap:10px;
      }

      .layout{
        grid-template-rows:minmax(180px, 31dvh) minmax(0,1fr);
      }

      .detail-wrap{
        padding:18px 16px 20px;
      }

      .detail-bg-art{
        width:min(52%, 240px);
        top:6px;
        right:6px;
        max-height:195px;
        opacity:.58;
      }

      .detail-header{
        grid-template-columns:80px minmax(0,1fr);
        gap:12px;
      }

      .detail-thumb{
        width:80px;
        height:80px;
      }

      .detail-title h2{
        font-size:1.8rem;
      }

      .detail-title .name{
        font-size:1rem;
      }

      .position-row{
        grid-template-columns:1fr;
      }

      .position-icon{
        width:66px;
        height:66px;
      }

      .position-icon img{
        width:48px;
        height:48px;
      }

      .position-title{
        font-size:1.45rem;
      }

      .desc,
      .ability-desc{
        font-size:.92rem;
      }

      .ability-title{
        font-size:1rem;
      }
    }

    @media (max-width:560px){
      .operator-list{
        grid-template-columns:repeat(2, minmax(0,1fr));
        gap:9px;
      }

      .operator-card{
        padding:10px 8px;
        border-radius:18px;
      }

      .thumb{
        max-width:88px;
        height:88px;
      }

      .codename{
        font-size:.84rem;
      }

      .realname{
        font-size:.76rem;
      }

      .role-chip{
        font-size:.62rem;
        padding:4px 7px;
      }

      .detail-bg-art{
        width:min(45%, 165px);
        top:4px;
        right:4px;
        max-height:135px;
        opacity:.44;
      }
    }

    @media (max-width:380px){
      .operator-list{
        grid-template-columns:1fr;
      }

      .layout{
        grid-template-rows:minmax(170px, 30dvh) minmax(0,1fr);
      }
    }
  </style>
</head>
<body>
  <div id="preloader">

    <p style="font-family:'Orbitron',sans-serif; letter-spacing:2px; color:#00ffc8;">Loading Operator Database...</p>

  <main class="shell">

  <script>

    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmb2N3cmpsc3VxZHB3aXN2dmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Njk5MTQsImV4cCI6MjA5MTA0NTkxNH0._fV9yPZHX26kpcRuvwX56sjo5Jnv-6LQRS4HjMW8ecQ';

    const OPERATOR_BG_IMAGE_BASES = [

    const ROLE_IMAGE_BASES = [

    const ROLE_ANALYSIS = {

      engineer: "In esports, Engineer operators bring structure and utility value. They are strongest in disciplined setups, defensive holds, and vehicle or objective-heavy situations, giving teams more staying power, better area control, and stronger answers to drawn-out engagements.",

      support: "In tournaments, Support operators are the backbone of team consistency. They keep squads in fighting shape during extended skirmishes, improve recovery between trades, and add stability in messy situations, making them essential for teams that rely on endurance and coordinated resets."

    const PLACEHOLDER_TEXT = 'Description placeholder — to be added later.';

    const state = {

      operatorBgImageCache: new Map(),
      roleImageCache: new Map()
    };

    const els = {
      preloader: document.getElementById('preloader'),
      dbStatus: document.getElementById('dbStatus'),
      searchInput: document.getElementById('searchInput'),
      roleFilter: document.getElementById('roleFilter'),
      refreshBtn: document.getElementById('refreshBtn'),

      operatorList: document.getElementById('operatorList'),

    function safeText(value) {
      if (value === null || value === undefined) return '';
      if (typeof value === 'string') return value.trim();
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      if (Array.isArray(value)) return value.map(safeText).filter(Boolean).join(', ');
      if (typeof value === 'object') {
        try { return JSON.stringify(value); } catch { return ''; }
      }
      return String(value);
    }

    function escapeHtml(value) {
      return safeText(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normKey(key) {
      return String(key || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function flattenRow(row) {
      const merged = { ...(row || {}) };
      const nestedCandidates = ['data', 'details', 'profile', 'payload', 'operator_data', 'operatordata'];
      for (const key of nestedCandidates) {
        if (row && row[key] && typeof row[key] === 'object' && !Array.isArray(row[key])) {
          Object.assign(merged, row[key]);
        }
      }
      return merged;
    }

    function getValue(row, candidateKeys) {
      const flat = flattenRow(row);
      const map = {};
      for (const [key, value] of Object.entries(flat)) {
        map[normKey(key)] = value;
      }
      for (const key of candidateKeys) {
        const value = map[normKey(key)];
        if (safeText(value)) return value;
      }
      return '';
    }

    function slugify(value) {
      let slug = safeText(value).toLowerCase();
      slug = slug.replace(/_/g, '-').replace(/\s+/g, '-');
      slug = slug.replace(/[^a-z0-9-]/g, '');
      slug = slug.replace(/-+/g, '-').replace(/^-|-$/g, '');
      return slug;
    }

    function toOperatorSlug(value) {
      const slug = slugify(value);
      if (KNOWN_OPERATOR_SLUGS.includes(slug)) return slug;

      const compact = slug.replace(/-/g, '');
      const found = KNOWN_OPERATOR_SLUGS.find(item => item.replace(/-/g, '') === compact);
      return found || slug;
    }

    function toRoleSlug(value) {
      const slug = slugify(value);
      if (KNOWN_ROLE_SLUGS.includes(slug)) return slug;
      if (slug.includes('assault')) return 'assault';
      if (slug.includes('support')) return 'support';
      if (slug.includes('engineer')) return 'engineer';
      if (slug.includes('recon')) return 'recon';
      return slug;
    }

    function hexToRgba(hex, alpha) {
      const clean = String(hex || '').replace('#', '');
      if (clean.length !== 6) return `rgba(0,255,200,${alpha})`;
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getRoleTheme(role) {
      const slug = toRoleSlug(role);

      if (slug === 'assault') return { slug, color: '#ff3b63' };
      if (slug === 'engineer') return { slug, color: '#efcc61' };
      if (slug === 'recon') return { slug, color: '#21e6f5' };
      if (slug === 'support') return { slug, color: '#23e28f' };

      return { slug, color: '#00ffc8' };
    }

    function roleStyleVars(theme) {
      return [
        `--role-color:${theme.color}`,
        `--role-bg:${hexToRgba(theme.color, 0.10)}`,
        `--role-border:${hexToRgba(theme.color, 0.28)}`
      ].join(';');
    }

    function roleValue(op) {
      return op.role || 'Unknown';
    }

    function operatorImageCandidates(op) {
      if (!op.imageKey) return [];
      return OPERATOR_IMAGE_BASES.map(base => `${base}/${op.imageKey}.png`);
    }

    function operatorBgImageCandidates(op) {
      if (!op.imageKey) return [];
      return [
        ...OPERATOR_BG_IMAGE_BASES.map(base => `${base}/${op.imageKey}_bg.jpg`),
        ...OPERATOR_BG_IMAGE_BASES.map(base => `${base}/${op.imageKey}_bg.png`),
        ...OPERATOR_BG_IMAGE_BASES.map(base => `${base}/${op.imageKey}_bg.webp`)
      ];
    }

    function roleImageCandidates(role) {
      const roleSlug = toRoleSlug(role);
      if (!roleSlug) return [];
      return ROLE_IMAGE_BASES.map(base => `${base}/${roleSlug}.png`);
    }

    function resolveOperatorImage(op) {
      if (state.operatorImageCache.has(op.id)) {
        return Promise.resolve(state.operatorImageCache.get(op.id));
      }

      const candidates = operatorImageCandidates(op);
      let index = 0;

      return new Promise(resolve => {
        const tryNext = () => {
          if (index >= candidates.length) {
            state.operatorImageCache.set(op.id, '');
            resolve('');
            return;
          }

          const src = candidates[index++];
          const img = new Image();

          img.onload = () => {
            state.operatorImageCache.set(op.id, src);
            resolve(src);
          };

          img.onerror = tryNext;
          img.src = src;
        };

        tryNext();
      });
    }

    function resolveOperatorBgImage(op) {
      if (state.operatorBgImageCache.has(op.id)) {
        return Promise.resolve(state.operatorBgImageCache.get(op.id));
      }

      const candidates = operatorBgImageCandidates(op);
      let index = 0;

      return new Promise(resolve => {
        const tryNext = () => {
          if (index >= candidates.length) {
            state.operatorBgImageCache.set(op.id, '');
            resolve('');
            return;
          }

          const src = candidates[index++];
          const img = new Image();

          img.onload = () => {
            state.operatorBgImageCache.set(op.id, src);
            resolve(src);
          };

          img.onerror = tryNext;
          img.src = src;
        };

        tryNext();
      });
    }

    function resolveRoleImage(role) {
      const key = toRoleSlug(role);
      if (state.roleImageCache.has(key)) {
        return Promise.resolve(state.roleImageCache.get(key));
      }

      const candidates = roleImageCandidates(role);
      let index = 0;

      return new Promise(resolve => {
        const tryNext = () => {
          if (index >= candidates.length) {
            state.roleImageCache.set(key, '');
            resolve('');
            return;
          }

          const src = candidates[index++];
          const img = new Image();

          img.onload = () => {
            state.roleImageCache.set(key, src);
            resolve(src);
          };

          img.onerror = tryNext;
          img.src = src;
        };

        tryNext();
      });
    }

    function normalizeAbility(type, title, desc) {
      const cleanType = safeText(type);
      const cleanTitle = safeText(title);
      let cleanDesc = safeText(desc);

      if ((cleanType === 'Gadget' || cleanType === 'Trait') && !cleanDesc) {
        cleanDesc = PLACEHOLDER_TEXT;
      }

      if (!cleanTitle && !cleanDesc) return null;

      return {
        type: cleanType || 'Ability',
        title: cleanTitle || (cleanType === 'Gadget' ? 'Pending Gadget' : cleanType === 'Trait' ? 'Pending Trait' : 'Ability'),
        desc: cleanDesc || 'No description available.'
      };
    }

    function buildAbilities(row) {
      const flat = flattenRow(row);
      const abilities = [];
      const seen = new Set();

      function pushAbility(type, title, desc) {
        const item = normalizeAbility(type, title, desc);
        if (!item) return;

        const sig = `${item.type}|${item.title}|${item.desc}`.toLowerCase();
        if (seen.has(sig)) return;
        seen.add(sig);
        abilities.push(item);
      }

      pushAbility(
        'Tactical Gear',
        getValue(flat, ['tactical_gear', 'tacticalgear', 'tactical_name', 'skill_1_name', 'skill1_name', 'ability_1_name']),
        getValue(flat, ['tactical_gear_desc', 'tacticalgeardesc', 'tactical_desc', 'tactical_description', 'skill_1_desc', 'skill1desc', 'skill_1_description', 'skill1description', 'ability_1_desc', 'ability_1_description'])
      );

      pushAbility(
        'Gadget',
        getValue(flat, ['gadget_1', 'gadget1', 'gadget_one', 'skill_2_name', 'skill2_name', 'ability_2_name']),
        getValue(flat, ['gadget_1_desc', 'gadget1desc', 'gadget_one_desc', 'gadget_1_description', 'gadget1description', 'skill_2_desc', 'skill2desc', 'skill_2_description', 'skill2description', 'ability_2_desc', 'ability_2_description'])
      );

      pushAbility(
        'Gadget',
        getValue(flat, ['gadget_2', 'gadget2', 'gadget_two', 'secondary_gadget', 'skill_3_name', 'skill3_name', 'ability_3_name']),
        getValue(flat, ['gadget_2_desc', 'gadget2desc', 'gadget_two_desc', 'gadget_2_description', 'gadget2description', 'secondary_gadget_desc', 'secondary_gadget_description', 'skill_3_desc', 'skill3desc', 'skill_3_description', 'skill3description', 'ability_3_desc', 'ability_3_description'])
      );

      pushAbility(
        'Trait',
        getValue(flat, ['trait', 'trait_name', 'passive', 'passive_name', 'perk', 'perk_name']),
        getValue(flat, ['trait_desc', 'trait_description', 'passive_desc', 'passive_description', 'perk_desc', 'perk_description'])
      );

      if (!abilities.some(item => item.type === 'Gadget')) {
        pushAbility('Gadget', 'Pending Gadget', '');
      }

      if (!abilities.some(item => item.type === 'Trait')) {
        pushAbility('Trait', 'Pending Trait', '');
      }

      return abilities;
    }

    function normalizeOperator(row, index = 0) {
      const flat = flattenRow(row);

      const codenameRaw = safeText(getValue(flat, ['operator', 'Operator', 'code_name', 'codename'])) || `operator-${index + 1}`;
      const codename = codenameRaw;
      const imageKey = toOperatorSlug(codenameRaw);

      const realName = safeText(getValue(flat, ['name', 'real_name', 'realname', 'full_name', 'fullname']));
      const role = safeText(getValue(flat, ['role', 'position', 'class', 'operator_role', 'operatorrole']));
      const roleDesc = safeText(getValue(flat, [
        'role_desc',
        'role_description',
        'position_desc',
        'position_description',
        'class_desc',
        'class_description',
        'roledetails',
        'positiondetails'
      ]));
      const bio = safeText(getValue(flat, ['bio', 'description', 'overview', 'summary', 'lore']));
      const faction = safeText(getValue(flat, ['faction', 'unit', 'team', 'organization']));
      const origin = safeText(getValue(flat, ['origin', 'country', 'nationality', 'region']));
      const id = safeText(getValue(flat, ['id', 'uuid', 'operator_id'])) || `${imageKey || codename}-${index}`;

      return {
        raw: flat,
        id,
        codename,
        realName,
        role,
        roleDesc,
        bio,
        faction,
        origin,
        imageKey,
        abilities: buildAbilities(flat)
      };
    }

    function operatorSort(a, b) {
      return a.codename.localeCompare(b.codename, undefined, { sensitivity: 'base' });
    }

    function populateRoleFilter() {
      const roles = [...new Set(state.all.map(roleValue).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      els.roleFilter.innerHTML = `
        <option value="all">All roles</option>
        ${roles.map(role => `<option value="${escapeHtml(role)}">${escapeHtml(role)}</option>`).join('')}
      `;
    }

    function applyFilters() {
      const query = els.searchInput.value.trim().toLowerCase();
      const role = els.roleFilter.value;

      state.filtered = state.all.filter(op => {
        const haystack = [
          op.codename,
          op.realName,
          op.role,
          op.roleDesc,
          op.bio,
          op.faction,
          op.origin,
          ...op.abilities.flatMap(item => [item.type, item.title, item.desc])
        ].join(' ').toLowerCase();

        const matchesSearch = !query || haystack.includes(query);
        const matchesRole = role === 'all' || roleValue(op) === role;
        return matchesSearch && matchesRole;
      });

      if (!state.filtered.some(op => op.id === state.selectedId)) {
        state.selectedId = state.filtered[0]?.id || null;
      }

      els.resultsText.textContent = `${state.filtered.length} operator${state.filtered.length === 1 ? '' : 's'}`;
      els.resultsHint.textContent = role === 'all' ? 'All roles' : role;
    }

    function renderThumb(imageSrc, label) {
      if (imageSrc) {
        return `
          <div class="thumb">
            <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(label)}">
          </div>
        `;
      }

      return `
        <div class="thumb">
          <div class="thumb-placeholder">${escapeHtml(label)}</div>
        </div>
      `;
    }

    async function renderOperatorList() {
      if (!state.filtered.length) {
        els.operatorList.innerHTML = `<div class="empty-state">No operators matched your current filters.</div>`;
        return;
      }

      const cards = await Promise.all(
        state.filtered.map(async op => {
          const imageSrc = await resolveOperatorImage(op);
          const theme = getRoleTheme(op.role);

          return `
            <article class="operator-card ${op.id === state.selectedId ? 'active' : ''}" data-id="${escapeHtml(op.id)}" style="${escapeHtml(roleStyleVars(theme))}">
              ${renderThumb(imageSrc, op.codename)}
              <div class="card-copy">
                ${op.role ? `<div class="role-chip">${escapeHtml(op.role)}</div>` : ''}
                <div class="codename">${escapeHtml(op.codename)}</div>
                ${op.realName ? `<div class="realname">${escapeHtml(op.realName)}</div>` : ''}
              </div>
            </article>
          `;
        })
      );

      els.operatorList.innerHTML = cards.join('');

      els.operatorList.querySelectorAll('.operator-card').forEach(card => {
        card.addEventListener('click', () => {
          state.selectedId = card.dataset.id;
          renderAll();
        });
      });
    }

    async function renderDetail() {
      const op =
        state.filtered.find(item => item.id === state.selectedId) ||
        state.all.find(item => item.id === state.selectedId) ||
        state.filtered[0] ||
        state.all[0];

      if (!op) {
        els.detailRoot.className = 'detail-root detail-empty';
        els.detailRoot.textContent = 'No operator selected.';
        return;
      }

      state.selectedId = op.id;

      const imageSrc = await resolveOperatorImage(op);
      const bgImageSrc = await resolveOperatorBgImage(op);
      const roleImageSrc = await resolveRoleImage(op.role);
      const roleTitle = op.role || 'Unknown';
      const chips = [op.role, op.faction, op.origin].filter(Boolean);
      const theme = getRoleTheme(op.role);
      const roleDesc =
        ROLE_ANALYSIS[theme.slug] ||
        op.roleDesc ||
        op.bio ||
        'No role description available.';

      els.detailRoot.className = 'detail-root';
      els.detailRoot.innerHTML = `
        <div class="detail-wrap" style="${escapeHtml(roleStyleVars(theme))}">
          ${bgImageSrc ? `
            <div class="detail-bg-art">
              <img src="${escapeHtml(bgImageSrc)}" alt="">
            </div>
          ` : ''}

          <div class="detail-header">
            <div class="detail-thumb">
              ${imageSrc
                ? `<img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(op.codename)}">`
                : `<div class="thumb-placeholder">${escapeHtml(op.codename)}</div>`}
            </div>

            <div class="detail-title">
              <h2>${escapeHtml(op.codename)}</h2>
              ${op.realName ? `<div class="name">Name: ${escapeHtml(op.realName)}</div>` : ''}
            </div>
          </div>

          <div class="separator"></div>

          ${chips.length ? `
            <div class="mini-chip-row">
              ${chips.map(chip => `<span class="mini-chip">${escapeHtml(chip)}</span>`).join('')}
            </div>
          ` : ''}

          <div class="info-block">
            <div class="position-row">
              <div class="position-icon">
                ${roleImageSrc
                  ? `<img src="${escapeHtml(roleImageSrc)}" alt="${escapeHtml(roleTitle)}">`
                  : `<div class="position-fallback">${escapeHtml((roleTitle || '?').charAt(0))}</div>`}
              </div>
              <div>
                <span class="position-label">Position</span>
                <div class="position-title">${escapeHtml(roleTitle)}</div>
                <div class="desc">${escapeHtml(roleDesc)}</div>
              </div>
            </div>
          </div>

          ${op.abilities.map(item => `
            <div class="info-block">
              <div class="ability-title">${escapeHtml(item.type)} - ${escapeHtml(item.title)}</div>
              <div class="ability-desc">${escapeHtml(item.desc)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    async function renderAll() {
      applyFilters();
      await renderOperatorList();
      await renderDetail();
    }

    async function loadOperators() {
      els.dbStatus.textContent = 'Loading operator database...';
      els.refreshBtn.disabled = true;
      els.detailRoot.className = 'detail-root detail-empty';
      els.detailRoot.textContent = 'Loading operator data...';

      try {
        const response = await fetch(REST_URL, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
            Accept: 'application/json',
            'Accept-Profile': 'public'
          }
        });

        const text = await response.text();
        let rows = [];

        try {
          rows = text ? JSON.parse(text) : [];
        } catch (err) {
          throw new Error(`Invalid JSON response: ${text}`);
        }

        if (!response.ok) {
          const message = rows?.message || rows?.error || `${response.status} ${response.statusText}`;
          throw new Error(message);
        }

        if (!Array.isArray(rows)) {
          throw new Error('Unexpected response format from Supabase.');
        }

        state.all = rows.map((row, index) => normalizeOperator(row, index)).sort(operatorSort);
        state.selectedId = state.all[0]?.id || null;

        populateRoleFilter();
        await renderAll();

        els.dbStatus.textContent = `Connected — ${state.all.length} operators loaded`;
      } catch (error) {
        console.error('Operator load error:', error);
        els.dbStatus.textContent = 'Connection failed';
        els.operatorList.innerHTML = `<div class="error-state"><strong>Unable to load operators.</strong><br>${escapeHtml(error.message)}</div>`;
        els.detailRoot.className = 'detail-root detail-empty';
        els.detailRoot.innerHTML = `<div class="error-state"><strong>Supabase request failed.</strong><br>${escapeHtml(error.message)}</div>`;
      } finally {
        els.refreshBtn.disabled = false;
        setTimeout(() => els.preloader.classList.add('hidden'), 350);
      }
    }

    els.searchInput.addEventListener('input', () => renderAll());
    els.roleFilter.addEventListener('change', () => renderAll());
    els.refreshBtn.addEventListener('click', loadOperators);

    window.addEventListener('load', loadOperators);
  </script>
</body>
</html>
